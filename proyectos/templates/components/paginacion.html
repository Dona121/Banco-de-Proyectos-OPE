{% if is_paginated %}
<nav class="mt-6 flex items-center justify-center gap-1">
  {% if page_obj.has_previous %}
  <a href="?{% if q %}q={{ q }}&{% endif %}{% if estado_sel %}estado={{ estado_sel }}&{% endif %}{% if proyecto_sel %}proyecto={{ proyecto_sel }}&{% endif %}page={{ page_obj.previous_page_number }}"
     class="btn btn-outline px-3 py-1.5 text-sm">Anterior</a>
  {% endif %}
  <span class="px-4 py-1.5 text-sm text-slate-500">Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
  <a href="?{% if q %}q={{ q }}&{% endif %}{% if estado_sel %}estado={{ estado_sel }}&{% endif %}{% if proyecto_sel %}proyecto={{ proyecto_sel }}&{% endif %}page={{ page_obj.next_page_number }}"
     class="btn btn-outline px-3 py-1.5 text-sm">Siguiente</a>
  {% endif %}
</nav>
{% endif %}
