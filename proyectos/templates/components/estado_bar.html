{% comment %}Gráfico de distribución por estado: barra apilada + leyenda. Espera: segmentos (lista de label/count/pct/color).{% endcomment %}
<div class="flex h-3.5 w-full overflow-hidden rounded-full bg-slate-100">
  {% for s in segmentos %}{% if s.count %}
  <div style="width: {{ s.pct }}%; background: {{ s.color }}" title="{{ s.label }}: {{ s.count }}"></div>
  {% endif %}{% endfor %}
</div>
<div class="mt-4 grid grid-cols-2 gap-x-4 gap-y-2.5 text-sm">
  {% for s in segmentos %}
  <div class="flex items-center gap-2">
    <span class="h-2.5 w-2.5 shrink-0 rounded-full" style="background: {{ s.color }}"></span>
    <span class="text-slate-500 truncate">{{ s.label }}</span>
    <span class="ml-auto font-semibold text-slate-700">{{ s.count }}</span>
  </div>
  {% endfor %}
</div>
