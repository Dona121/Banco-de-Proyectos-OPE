<div>
  <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-600 mb-1">
    {{ field.label }}{% if field.field.required %} <span class="text-rojo">*</span>{% endif %}
  </label>
  {{ field }}
  {% for error in field.errors %}
  <p class="mt-1 text-xs text-rojo">{{ error }}</p>
  {% endfor %}
  {% if field.help_text %}<p class="mt-1 text-xs text-slate-400">{{ field.help_text }}</p>{% endif %}
</div>
